# netlify.toml
# Netlify deployment configuration for City Stays Booking SPA.
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

# ── Build Settings ─────────────────────────────────────────────────────────────
[build]
  # The command Netlify runs to build the project.
  command = "npm run build"

  # The directory Netlify deploys after the build completes.
  # Vite outputs to `dist/` by default.
  publish = "dist"

  # Pin Node.js version to match local development and CI.
  [build.environment]
    NODE_VERSION = "20"

# ── Context-Specific Builds ───────────────────────────────────────────────────
# Netlify supports three deploy contexts beyond the default:
#   production     → merges to the main branch
#   deploy-preview → every pull request gets a unique preview URL:
#                    https://deploy-preview-<PR#>--city-stays-booking.netlify.app
#   branch-deploy  → any non-production branch push

[context.production]
  # Run the full validation pipeline (lint + test) before building.
  # A failing lint or test will abort the production deploy.
  command = "npm run validate && npm run build"

[context.deploy-preview]
  # Skip validation on PRs for faster feedback loops.
  # The CI pipeline (GitHub Actions) already runs lint + test on every PR.
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# ── SPA Client-Side Routing Fix ───────────────────────────────────────────────
# WHY this is CRITICAL:
# React Router handles routing entirely in the browser (client-side).
# When a user visits https://city-stays-booking.netlify.app/offer/42 directly,
# or hits refresh on that URL, Netlify's CDN looks for a file at /offer/42.
# That file doesn't exist — Vite only outputs /index.html.
# Without this redirect, Netlify returns a raw 404.
#
# This rule tells Netlify: "For ANY incoming URL, serve index.html with a
# 200 OK status." The browser loads the React app, React Router reads the URL,
# and renders the correct page — fully transparent to the user.
#
# IMPORTANT: Place this AFTER any more specific redirect rules. Netlify
# evaluates redirects top-to-bottom and stops at the first match.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security Headers ──────────────────────────────────────────────────────────
# Applied globally to every response served from Netlify's CDN.
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent this site from being embedded in an iframe on a foreign origin.
    # SAMEORIGIN allows same-origin frames (e.g. Netlify deploy previews).
    X-Frame-Options = "SAMEORIGIN"

    # Disable MIME-type sniffing. Prevents browsers from misinterpreting a
    # response as a different content type than what the server declares.
    X-Content-Type-Options = "nosniff"

    # Enable the browser's built-in reflected XSS filter (legacy browsers).
    X-XSS-Protection = "1; mode=block"

    # Limit referrer information on cross-origin requests.
    # Sends the full URL on same-origin; origin-only on HTTPS→HTTPS cross-origin;
    # nothing on HTTPS→HTTP downgrade.
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable browser features this app does not use.
    # `geolocation=(self)` is allowed because Leaflet maps may request it.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

    # Strict Transport Security: force HTTPS for 1 year, including subdomains.
    # `preload` makes this eligible for browser HSTS preload lists.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Asset Caching ─────────────────────────────────────────────────────────────
# Vite fingerprints all static asset filenames with a content hash
# (e.g. index-Bx2q4k.js). These files are content-addressed — if the content
# changes the hash changes, so the old URL is never reused.
# It is therefore safe to cache them for 1 year (31536000 seconds).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
